# Local PostgreSQL for Carbon WMS — Orlando Warehouse 001
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wms
      POSTGRES_PASSWORD: wms_local
      POSTGRES_DB: carbon_wms
    ports:
      - "5434:5432"
    volumes:
      - wms_pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

volumes:
  wms_pg_data:
