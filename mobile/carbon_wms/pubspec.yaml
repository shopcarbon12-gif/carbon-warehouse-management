name: carbon_wms
description: Carbon WMS rugged handheld client (Chainway & Zebra HAL).
publish_to: "none"
version: 0.1.11+17

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  carbon_chainway_driver:
    path: packages/carbon_chainway_driver
  carbon_zebra_driver:
    path: packages/carbon_zebra_driver
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.3
  device_info_plus: ^11.2.0
  android_id: ^0.4.0
  package_info_plus: ^8.1.2
  install_plugin: ^2.1.0
  path_provider: ^2.1.4
  audioplayers: ^6.1.0
  mobile_scanner: ^7.2.0
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/carbon_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/app_icon.png
