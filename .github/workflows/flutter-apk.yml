# Builds Carbon WMS Android APK when mobile app sources change.
# Download the artifact from the workflow run (Actions → workflow → Artifacts).
name: Flutter APK (carbon_wms)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/carbon_wms/**"
      - ".github/workflows/flutter-apk.yml"

jobs:
  android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/carbon_wms

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - name: Scaffold Android (and other) platform folders
        run: flutter create . --project-name carbon_wms

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: carbon-wms-release-apk
          path: mobile/carbon_wms/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
